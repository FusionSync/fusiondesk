site_name: FusionDesk
site_description: FusionDesk remote desktop runtime documentation
site_url: https://fusionsync.github.io/fusiondesk/
repo_url: https://github.com/FusionSync/fusiondesk
repo_name: FusionSync/fusiondesk
edit_uri: edit/master/docs/

theme:
  name: material
  language: zh
  logo: assets/fusiondesk-architecture.svg
  favicon: assets/fusiondesk-architecture.svg
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search:
      lang:
        - en
        - zh

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - toc:
      permalink: true

nav:
  - 首页: index.md
  - 快速开始:
      - 构建与测试: getting-started.md
      - PC Shell 使用: usage/pc-shell.md
      - PC Shell 参数模型: usage/pc-shell-options.md
  - 功能:
      - 剪切板重定向: features/clipboard.md
  - 开发:
      - 构建、测试与边界: development/build-and-test.md
      - GitHub Pages 文档发布: deployment/github-pages.md
  - 架构:
      - 架构索引: architecture/README.md
      - 产品路线图: architecture/PRODUCT_ROADMAP.md
      - 总体架构: architecture/FUSIONDESK_ARCHITECTURE.md
      - 项目启动方法: architecture/FUSIONDESK_PROJECT_INIT_METHOD.md
      - 当前实现基线: architecture/FUSIONDESK_IMPLEMENTATION_BASELINE.md
      - 最小主线: architecture/FUSIONDESK_MINIMAL_VERSION_MAINLINE.md
      - 最小版本 Runbook: architecture/FUSIONDESK_MINIMAL_VERSION_RUNBOOK.md
      - 目录布局: architecture/FUSIONDESK_DIRECTORY_LAYOUT.md
      - 模块与接口蓝图: architecture/MODULE_AND_INTERFACE_BLUEPRINT.md
      - Session 模型: architecture/SESSION_MODEL.md
      - Runtime 与 Session Manager: architecture/RUNTIME_HOST_AND_SESSION_MANAGER_DESIGN.md
      - 网络模型: architecture/NETWORK_MODEL.md
