name: FusionDesk Documentation

on:
  push:
    branches:
      - main
      - master
    paths:
      - mkdocs.yml
      - requirements-docs.txt
      - docs/**
      - .github/workflows/docs.yml
  pull_request:
    paths:
      - mkdocs.yml
      - requirements-docs.txt
      - docs/**
      - .github/workflows/docs.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-22.04
    outputs:
      pages_enabled: ${{ steps.pages.outputs.enabled }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install documentation dependencies
        run: python -m pip install -r requirements-docs.txt

      - name: Build documentation
        run: mkdocs build --strict

      - name: Check GitHub Pages configuration
        id: pages
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if build_type="$(gh api "repos/${GITHUB_REPOSITORY}/pages" --jq '.build_type' 2>/dev/null)"; then
            if [[ "$build_type" == "workflow" ]]; then
              echo "enabled=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::notice::GitHub Pages is enabled, but Source is not GitHub Actions. Set Settings -> Pages -> Build and deployment -> Source to GitHub Actions."
          else
            echo "::notice::GitHub Pages is not enabled for this repository yet. Set Settings -> Pages -> Build and deployment -> Source to GitHub Actions."
          fi
          echo "enabled=false" >> "$GITHUB_OUTPUT"

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && steps.pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request' && needs.build.outputs.pages_enabled == 'true'
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
